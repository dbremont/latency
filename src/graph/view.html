<!-- index.html -->
<!DOCTYPE html>
<html>
<head>
    <title>QLL - Contention Lab</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdn.plot.ly/plotly-2.27.1.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div class="container mx-auto p-6">
        <h1 class="text-3xl font-bold mb-6">QOIF-Latency Lab</h1>
        
        <div class="grid grid-cols-3 gap-6">
            <!-- Task Builder Panel -->
            <div class="bg-white rounded-lg shadow p-4">
                <h2 class="text-xl font-semibold mb-3">Task Set Builder</h2>
                <div id="task-list" class="space-y-2 mb-4"></div>
                <div class="flex gap-2">
                    <select id="task-type" class="border rounded p-1">
                        <option value="0">CPU-bound</option>
                        <option value="1">Memory-bound</option>
                        <option value="2">IO-bound</option>
                    </select>
                    <input id="task-size" type="number" step="0.1" value="0.5" class="border rounded p-1 w-20">
                    <button onclick="addTask()" class="bg-blue-500 text-white px-3 py-1 rounded">Add</button>
                    <button onclick="simulate()" class="bg-green-500 text-white px-3 py-1 rounded">Simulate</button>
                </div>
            </div>
            
            <!-- Latency Results -->
            <div class="bg-white rounded-lg shadow p-4 col-span-2">
                <h2 class="text-xl font-semibold mb-3">Latency Prediction</h2>
                <div id="latency-chart" class="h-64"></div>
                <div id="deviation" class="mt-4 text-lg"></div>
            </div>
            
            <!-- Graph Visualization -->
            <div class="bg-white rounded-lg shadow p-4 col-span-3">
                <h2 class="text-xl font-semibold mb-3">Contention Graph</h2>
                <div id="graph-canvas" class="h-96 border rounded"></div>
            </div>
        </div>
    </div>
    
    <script>
        let tasks = [];
        
        function addTask() {
            const type = parseInt(document.getElementById('task-type').value);
            const size = parseFloat(document.getElementById('task-size').value);
            tasks.push({ type, size, priority: 1 });
            renderTaskList();
        }
        
        function renderTaskList() {
            const container = document.getElementById('task-list');
            container.innerHTML = tasks.map((t, i) => `
                <div class="flex justify-between bg-gray-50 p-2 rounded">
                    <span>Type ${t.type} (${t.size})</span>
                    <button onclick="tasks.splice(${i},1);renderTaskList()" class="text-red-500">×</button>
                </div>
            `).join('');
        }
        
        async function simulate() {
            if (tasks.length === 0) return;
            
            const response = await fetch('/simulate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ tasks })
            });
            
            const data = await response.json();
            
            // Plot latency bars
            const trace = {
                x: tasks.map((_, i) => `Task ${i+1}`),
                y: data.latency,
                type: 'bar',
                marker: { color: '#3b82f6' }
            };
            Plotly.newPlot('latency-chart', [trace], {
                title: 'Per-Task Latency (ms)',
                yaxis: { title: 'Latency' }
            });
            
            // Show deviation
            document.getElementById('deviation').innerHTML = `
                <div class="p-3 rounded ${data.deviation > 0 ? 'bg-red-100' : 'bg-green-100'}">
                    Total Latency: ${data.total_latency.toFixed(2)} ms | 
                    Deviation: ${data.deviation > 0 ? '+' : ''}${data.deviation.toFixed(2)} ms
                    ${data.deviation > 0 ? '⚠️ Contention detected' : '✓ Near baseline'}
                </div>
            `;
            
            // Render graph
            renderGraph(data.graph);
        }
        
        function renderGraph(adjacency) {
            const width = 800, height = 400;
            const svg = d3.select("#graph-canvas")
                .html("")
                .append("svg")
                .attr("width", width)
                .attr("height", height);
            
            const n = adjacency.length;
            const nodes = Array.from({ length: n }, (_, i) => ({ id: i }));
            const links = [];
            
            for (let i = 0; i < n; i++) {
                for (let j = i+1; j < n; j++) {
                    if (adjacency[i][j] > 0.1) {
                        links.push({ source: i, target: j, weight: adjacency[i][j] });
                    }
                }
            }
            
            const simulation = d3.forceSimulation(nodes)
                .force("link", d3.forceLink(links).id(d => d.id).distance(100))
                .force("charge", d3.forceManyBody())
                .force("center", d3.forceCenter(width/2, height/2));
            
            const link = svg.append("g")
                .selectAll("line")
                .data(links)
                .join("line")
                .attr("stroke", d => `rgba(255,0,0,${d.weight})`)
                .attr("stroke-width", d => d.weight * 5);
            
            const node = svg.append("g")
                .selectAll("circle")
                .data(nodes)
                .join("circle")
                .attr("r", 20)
                .attr("fill", "#3b82f6")
                .call(drag(simulation));
            
            const label = svg.append("g")
                .selectAll("text")
                .data(nodes)
                .join("text")
                .text(d => `T${d.id}`)
                .attr("text-anchor", "middle")
                .attr("dy", 4);
            
            simulation.on("tick", () => {
                link.attr("x1", d => d.source.x)
                    .attr("y1", d => d.source.y)
                    .attr("x2", d => d.target.x)
                    .attr("y2", d => d.target.y);
                node.attr("cx", d => d.x).attr("cy", d => d.y);
                label.attr("x", d => d.x).attr("y", d => d.y);
            });
            
            function drag(simulation) {
                function dragstarted(event) {
                    if (!event.active) simulation.alphaTarget(0.3).restart();
                    event.subject.fx = event.subject.x;
                    event.subject.fy = event.subject.y;
                }
                function dragged(event) {
                    event.subject.fx = event.x;
                    event.subject.fy = event.y;
                }
                function dragended(event) {
                    if (!event.active) simulation.alphaTarget(0);
                    event.subject.fx = null;
                    event.subject.fy = null;
                }
                return d3.drag().on("start", dragstarted).on("drag", dragged).on("end", dragended);
            }
        }
        
        // Initial example
        tasks = [{ type: 0, size: 0.5, priority: 1 }, { type: 1, size: 0.7, priority: 1 }];
        renderTaskList();
    </script>
</body>
</html>
